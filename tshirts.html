<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirts | StitchCo.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; color: #333; background: #f8f8f8; }
        nav { background: #1a1a1a; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; }
        nav a { color: #fff; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        nav a:hover, nav a.active { color: #e63946; }
        .page-header { background: linear-gradient(135deg, #2d2d2d, #1a1a1a); color: #fff; padding: 3rem 2rem; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .product-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-image { height: 180px; background: linear-gradient(145deg, #e8e8e8, #f0f0f0); display: flex; align-items: center; justify-content: center; font-size: 5rem; }
        .product-info { padding: 1.5rem; }
        .product-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .product-price { font-size: 1.3rem; font-weight: bold; color: #e63946; margin-bottom: 1rem; }
        .section-label { font-size: 0.75rem; text-transform: uppercase; color: #888; margin-bottom: 0.5rem; letter-spacing: 1px; }
        .color-section { margin-bottom: 1rem; }
        .color-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ddd; flex-shrink: 0; }
        .color-name { font-size: 0.9rem; font-weight: 500; min-width: 60px; }
        .size-badge { display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 4px; font-size: 0.8rem; background: #f0f0f0; }
        .size-badge.in-stock { background: #27ae60; color: #fff; }
        .size-badge.low-stock { background: #f39c12; color: #fff; }
        .size-badge.out-of-stock { background: #ddd; color: #888; text-decoration: line-through; }
        footer { background: #1a1a1a; color: #fff; text-align: center; padding: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="hats.html">Hats</a></li>
            <li><a href="tshirts.html" class="active">T-Shirts</a></li>
            <li><a href="hoodies.html">Hoodies</a></li>
            <li><a href="process.html">Process</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <h1>👕 Embroidered T-Shirts</h1>
        <p>Premium cotton with detailed embroidery</p>
    </div>

    <div class="container">
        <div class="products-grid" id="products"></div>
    </div>

    <footer>
        <p>© 2026 StitchCo. All rights reserved.</p>
    </footer>

    <script src="inventory.js"></script>
    <script>
        const tshirts = getProductsByCategory('tshirt');
        const container = document.getElementById('products');
        
        tshirts.forEach(product => {
            let colorsHtml = '';
            
            product.colors.forEach(color => {
                const colorStock = getStockForColor(product, color);
                const stockClass = colorStock === 0 ? 'out-of-stock' : 'in-stock';
                const stockLabel = colorStock === 0 ? 'Out of Stock' : 'In Stock';
                
                let sizesHtml = '';
                product.sizes.forEach(size => {
                    const qty = product.stock[color]?.[size] || 0;
                    const sizeClass = qty === 0 ? 'out-of-stock' : 'in-stock';
                    sizesHtml += `<span class="size-badge ${sizeClass}">${size}</span>`;
                });
                
                colorsHtml += `
                    <div class="color-section">
                        <div class="color-row">
                            <div class="color-dot" style="background:${color}"></div>
                            <span class="color-name">${color}</span>
                            <span class="size-badge ${stockClass}">${stockLabel}</span>
                        </div>
                        <div>${sizesHtml}</div>
                    </div>
                `;
            });
            
            container.innerHTML += `
                <div class="product-card">
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">$${product.price}</div>
                        <div class="section-label">Sizes & Stock</div>
                        ${colorsHtml}
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
